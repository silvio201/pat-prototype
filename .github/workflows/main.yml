name: Javadoc Quality Check

on: [push, pull_request]

jobs:
  check-javadoc:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Project (inkl. Checker)
        run: mvn clean package # Oder ./gradlew build, je nach deinem Build-Tool

      - name: Run Javadoc Metric Checker
        # Hier wird dein Programm ausgeführt. 
        # Wenn es exit(1) aufruft, stoppt dieser Schritt und der gesamte Job.
        run: |
          java -jar target/pat-prototype-1.0-SNAPSHOT.jar -p src/test -anyj 0.5
        
        # Optional: Wenn du willst, dass der Fehler im Log schön formatiert ist
        continue-on-error: false # Standardmäßig true, aber wir wollen den Fehler sehen
        
      - name: Notify Success
        if: success()
        run: echo "Javadoc-Check bestanden!"
